services:
  pa:
    image: ghcr.io/faith/faith-project-agent:latest
    container_name: faith-pa
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/config:ro
      - ./data:/data
      - ./logs:/logs
    environment:
      - FAITH_CONFIG_DIR=/config
      - FAITH_LOG_DIR=/logs
      - FAITH_DATA_DIR=/data
      - FAITH_REDIS_URL=redis://redis:6379/0
      - MCP_REGISTRY_URL=http://mcp-registry:8080
    env_file:
      - ./config/.env
    networks:
      - maf-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      mcp-registry:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: faith-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - maf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web-ui:
    image: ghcr.io/faith/faith-web-ui:latest
    container_name: faith-web-ui
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/logs:ro
    environment:
      - FAITH_PA_URL=http://pa:8000
    networks:
      - maf-network
    restart: unless-stopped
    depends_on:
      pa:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: faith-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - maf-network
    restart: unless-stopped

  mcp-registry:
    image: ghcr.io/modelcontextprotocol/registry:latest
    container_name: faith-mcp-registry
    ports:
      - "8081:8080"
    networks:
      - maf-network
    restart: unless-stopped

networks:
  maf-network:
    name: maf-network
    driver: bridge

volumes:
  redis-data:
  ollama-data:
