metadata:
  generated_from: 'FRS-Multi-Agent-AI-Framework.md v0.1'
  date: '2026-03-23'
  purpose: 'Top-level task breakdown for implementation. Each task maps to one or more detailed task documents in tasks/.'
status_values: [TODO, IN PROGRESS, DONE]
complexity_scale:
  S: 'Small (< 1 day)'
  M: 'Medium (1–3 days)'
  L: 'Large (3–5 days)'
  XL: 'Extra Large (5+ days)'
model_guidance:
  Haiku: 'GPT-5.4-mini (simple, well-defined)'
  Sonnet: 'GPT-5.4 (moderate complexity)'
  Opus: 'GPT-5.4 high reasoning (complex, architectural)'
task_status_rule: 'Task status is updated only when implementation is complete for that task scope and verification has been attempted. Partial scaffolding or speculative code does not change a task to DONE.'
package_ownership:
  - path: 'src/faith_cli/'
    responsibility: 'bootstrap/CLI tasks plus optional host-worker lifecycle'
  - path: 'src/faith_pa/'
    responsibility: 'PA, agent runtime, config enforcement, security, wizard, session, and orchestration tasks'
  - path: 'src/faith_mcp/'
    responsibility: 'FAITH-owned MCP servers (one subpackage per server)'
  - path: 'src/faith_web/ + web/'
    responsibility: 'FastAPI server and frontend assets consuming the PA API'
  - path: 'src/faith_shared/'
    responsibility: 'shared schema, protocol, API contract, host-worker protocol, and compatibility/version contracts across FAITH packages'
phases:
  - id: 1
    title: 'Foundation'
    status: 'DONE'
    summary: 'Establish the project structure, Docker bootstrap, Redis, and configuration system. Everything else depends on this.'
    task_count: 6
    tasks:
      - id: 'FAITH-001'
        name: 'Project Directory Structure & Base Scaffolding'
        complexity: 'S'
        model: 'Haiku / GPT-5.4-mini'
        status: 'DONE'
        task_doc: 'tasks/FAITH-001-project-directory-structure.md'
        dependencies: []
        frs_reference: 'Section 2.4'
        summary: 'Create the `faith-cli` repository scaffold and framework-home templates (`~/.faith/`) as defined in the FRS. Includes `config/` templates, `data/`, `logs/`, `.gitignore`, and the `docker-compose.yml` bootstrap file (PA, Redis, Web UI, Ollama, and the self-hosted MCP Registry enabled by default). Also create the `faith-cli` Python package structure with bundled templates and `pyproject.toml`. Note: project-level `.faith/` directories are created by the PA during project setup, not at install time. Runtime/backend/tool implementation code lives in other packages within the monorepo.'
      - id: 'FAITH-002'
        name: 'Redis Container Setup'
        complexity: 'S'
        model: 'Haiku / GPT-5.4-mini'
        status: 'DONE'
        task_doc: 'tasks/FAITH-002-redis-container-setup.md'
        dependencies: ['FAITH-001']
        frs_reference: 'Section 2.2.4, 4.6.4'
        summary: 'Configure the Redis container in `docker-compose.yml` with AOF persistence enabled. Define the `maf-network` named Docker network. Verify Redis starts and is reachable from the network. Include health check.'
      - id: 'FAITH-003'
        name: 'Configuration System: YAML Loading & Pydantic Models'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-003-configuration-system.md'
        dependencies: ['FAITH-001']
        frs_reference: 'Section 7.1, 7.2, 7.5'
        summary: 'Define Pydantic models for all config files: framework-level `secrets.yaml`, project-level `.faith/system.yaml`, `.faith/security.yaml`, per-tool `.faith/tools/*.yaml`, and per-agent `.faith/agents/*/config.yaml`. The canonical models and JSON Schemas live in `faith-shared`; consuming packages import them rather than redefining them. Implement YAML loading with schema validation. Implement startup validation — if any config is invalid, halt with a human-readable error. Include `${VAR}` substitution for `secrets.yaml` referencing `.env`. Implement `secret_ref` resolution for tool configs referencing `secrets.yaml` keys.'
      - id: 'FAITH-004'
        name: 'Config Hot-Reload Watcher'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-004-config-hot-reload.md'
        dependencies: ['FAITH-003', 'FAITH-002']
        frs_reference: 'Section 7.3, 2.6, 3.7.7'
        summary: 'Implement a polling-based file watcher for `.faith/**/*.yaml`, `.faith/agents/*/prompt.md`, and `config/secrets.yaml` using SHA256 checksums (cross-platform, no OS-specific filesystem events). On change detection: validate against schema, apply if valid, reject and notify if invalid. Publish `system:config_changed` event to Redis `system-events` channel. Implement per-file handler dispatch table as defined in FRS Section 7.3 (split into project-level and framework-level handlers).'
      - id: 'FAITH-005'
        name: 'FAITH CLI (`faith-cli` Package)'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-005-faith-cli.md'
        dependencies: ['FAITH-001', 'FAITH-002']
        frs_reference: 'Section 9.2'
        summary: 'Implement the `faith-cli` Python package (installed via `pip install faith-cli`). Commands: `faith init` (verify Python prerequisite, create `~/.faith/`, extract bundled docker-compose.yml/templates/archetypes, pull Docker images, run `docker compose up -d`, open browser to wizard), `faith start` (start containers if not running, detect first-run → redirect to init), `faith stop` (POST `/api/shutdown` for coordinated teardown, then `docker compose down`), `faith restart`, `faith status` (show running state, active project, agents, container health), `faith update` (pull latest images, validate compatibility against `faith-shared` version rules, restart), `faith help`. The CLI owns the canonical bootstrap `docker-compose.yml` and the optional persistent host worker lifecycle for user-privilege host execution. Check Docker/Docker Compose installed. Cross-platform (Windows, Linux, macOS). Package includes `pyproject.toml`, bundled templates, and CLI entry point via `click` or `argparse`.'
      - id: 'FAITH-006'
        name: 'Config Migration System'
        complexity: 'S'
        model: 'Haiku / GPT-5.4-mini'
        status: 'DONE'
        task_doc: 'tasks/FAITH-006-config-migration.md'
        dependencies: ['FAITH-003']
        frs_reference: 'Section 7.6'
        summary: 'Implement schema version detection on startup for all config files (`.faith/system.yaml`, `.faith/security.yaml`, `.faith/tools/*.yaml`, `.faith/agents/*/config.yaml`, `config/secrets.yaml`). If version mismatch: display migration guide, offer auto-migrate with backup (`*.bak-vX.Y`), validate after migration. No silent migrations.'
  - id: 2
    title: 'Compact Protocol & Event System'
    status: 'DONE'
    summary: 'Define the messaging and event data models that underpin all communication.'
    task_count: 4
    tasks:
      - id: 'FAITH-007'
        name: 'Compact Protocol Data Models & Serialisation'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-007-compact-protocol.md'
        dependencies: ['FAITH-002']
        frs_reference: 'Section 3.3, 3.4'
        summary: 'Define Python dataclasses/Pydantic models for the compact protocol message format. Implement serialisation to/from YAML (for protocol messages) and JSON (for Redis transport). Include all fields: `from`, `to`, `channel`, `msg_id`, `type`, `tags`, `status`, `files`, `summary`, `needs`, `context_ref`, `priority`, `disposable`. Implement tag-based filtering logic per FRS Section 3.4. Implement `context_ref` resolution.'
      - id: 'FAITH-008'
        name: 'Event System Data Models & Publisher'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-008-event-system-publisher.md'
        dependencies: ['FAITH-002']
        frs_reference: 'Section 3.7.1–3.7.4'
        summary: 'Define Python dataclasses for the event format (JSON). Implement `EventPublisher` class with Redis pub/sub to `system-events` channel. Include typed helper methods for all event types in the catalogue: `agent:task_complete`, `agent:heartbeat`, `channel:stalled`, `tool:call_started`, `file:changed`, `approval:requested`, `resource:token_threshold`, `system:config_changed`, etc.'
      - id: 'FAITH-009'
        name: 'Event Subscriber & Dispatcher'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-009-event-subscriber-dispatcher.md'
        dependencies: ['FAITH-008']
        frs_reference: 'Section 3.7.5, 3.7.6, 3.7.8'
        summary: 'Implement `EventSubscriber` class that listens on `system-events` and dispatches events to registered handlers by event type. This is the PA''s primary input loop. Include stall detection logic: maintain per-channel last-message timestamps, 60-second background tick, configurable timeout (default 5 min). Tool activity (`tool:call_started`/`tool:call_complete`) resets stall timer. Heartbeat absence detection (3 missed beats = error event). Include `CompletionBatcher` support class: tracks a pending-completions set, buffers incoming `agent:task_complete` results, and only fires a batch-ready callback when all expected completions arrive or a configurable timeout expires (default 10 min). Urgent events (`agent:error`, `channel:stalled`, `channel:loop_detected`, `approval:requested`) always bypass batching and dispatch immediately.'
  - id: 3
    title: 'Base Agent Runtime'
    status: 'DONE'
    summary: 'Build the reusable agent base class that all specialist agents inherit from.'
    task_count: 4
    tasks:
      - id: 'FAITH-010'
        name: 'Base Agent Class'
        complexity: 'L'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-010-base-agent-class.md'
        dependencies: ['FAITH-007', 'FAITH-008']
        frs_reference: 'Section 3.5, 3.6, 3.7.4'
        summary: 'Implement the base agent runtime: context assembly (system prompt → role reminder → context summary → CAG documents → recent messages → current task), LLM API call (supporting Ollama and OpenRouter endpoints), response parsing, compact protocol message handling, Redis channel subscription, heartbeat publishing (every 30s), and event publishing. Include token counting via `tiktoken` with 4-char/token fallback for unsupported encodings. Include 10% safety margin on thresholds.'
      - id: 'FAITH-011'
        name: 'Rolling Context Summary & Compaction'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-011-rolling-context-summary.md'
        dependencies: ['FAITH-010']
        frs_reference: 'Section 3.5.2, 3.5.3'
        summary: 'Implement adaptive summarisation triggered by token count (default: 50% of model context window) with hard 50-message fallback. Write summaries to `.faith/agents/{id}/context.md` in the project workspace. Handle `disposable: true` messages — replace with single summary line during compaction. Load `context.md` on agent startup. Implement per-agent threshold overrides from `.faith/agents/{id}/config.yaml`.'
      - id: 'FAITH-012'
        name: 'MCP Adapter Layer'
        complexity: 'L'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-012-mcp-adapter-layer.md'
        dependencies: ['FAITH-010']
        frs_reference: 'Section 4.1'
        summary: 'Implement the transparent MCP translation layer in the PA. Agent requests always use compact protocol format (`type: tool_call`). PA checks model capability flag in `.faith/agents/{id}/config.yaml`. Native MCP: forward directly. Non-MCP: translate to structured prompt instruction, execute, return result in same format. Stateless, mechanical — no reasoning. Works transparently with external MCP servers (Section 4.11).'
      - id: 'FAITH-013'
        name: 'LLM API Client (Ollama + OpenRouter)'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-013-llm-api-client.md'
        dependencies: ['FAITH-010']
        frs_reference: 'Section 3.6.4, 3.6.5'
        summary: 'Implement unified LLM API client supporting both Ollama (`/api/chat`) and OpenRouter (`/api/v1/chat/completions`) endpoints. Ollama access must support bundled-container and external-host endpoints, resolved in a platform-aware way (Linux container-first when accelerator support is confirmed, Windows container only when WSL2/Docker GPU support is confirmed otherwise host Ollama, macOS host Ollama by default). Include startup capability probing for local models (working GPU path, usable VRAM, RAM fallback, lightweight inference check), exponential backoff retry (3 retries, 2s→4s→8s), error classification, fallback model support, and `agent:error` publication after retry exhaustion. Model config from `.faith/agents/{id}/config.yaml` with `.faith/system.yaml` defaults.'
  - id: 4
    title: 'PA Core'
    status: 'DONE'
    summary: 'Build the Project Agent — the brain of the system.'
    task_count: 6
    tasks:
      - id: 'FAITH-014'
        name: 'PA Container Setup & Docker SDK Integration'
        complexity: 'M'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-014-pa-container-setup.md'
        dependencies: ['FAITH-001', 'FAITH-002', 'FAITH-010']
        frs_reference: 'Section 4.6.1, 4.6.2'
        summary: 'Build the PA Dockerfile with Docker Python SDK and implement container lifecycle methods for project-scoped agents, FAITH-owned tool containers, disposable sandbox containers, and the project-scoped mcp-runtime container. The PA mounts the Docker socket, but the Docker socket must never be mounted into agent, tool, or sandbox containers. Sandbox containers must not run in privileged mode, must not use host networking, and must receive only approved mounts plus the minimum required Linux capabilities. Credentials are resolved from config/secrets.yaml via secret_ref.'
      - id: 'FAITH-057'
        name: 'Disposable Sandbox Lifecycle & Scheduling'
        complexity: 'L'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-057-disposable-sandbox-lifecycle-scheduling.md'
        dependencies: ['FAITH-014']
        frs_reference: 'Section 2.3, 4.2'
        summary: 'Implement the PA-managed disposable sandbox runtime used for agent execution. A sandbox is a Linux Docker container fully controlled by the PA, not a restricted Unix user inside a shared runtime. Root access is allowed only inside the disposable sandbox container and only under strict isolation controls: no Docker socket, no privileged mode, no host networking, approved mounts only, and minimal capabilities. The PA must create, reuse, allocate, reset, and destroy sandboxes; support shared vs isolated allocation; enforce resource quotas; and emit audit/status events for sandbox lifecycle decisions.'
      - id: 'FAITH-015'
        name: 'PA Session & Task Management'
        complexity: 'L'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-015-pa-session-task-management.md'
        dependencies: ['FAITH-014', 'FAITH-057', 'FAITH-009']
        frs_reference: 'Section 3.2, 8.4'
        summary: 'Implement the two-level session/task structure. Session = user work period (starts on connect, ends on disconnect/idle). Task = discrete goal within a session (millisecond-precision ID). Create session directories (.faith/sessions/sess-XXXX-YYYY-MM-DD/), write session.meta.json and 	ask.meta.json. Manage channel creation per task. Implement staged agent involvement — bring agents into channels only when their phase begins. Implement project switching (Section 2.5): coordinated teardown (save state.md per agent, stop agent containers), mount new project workspace, reconstruct agent team from .faith/agents/*/config.yaml, re-index RAG and Code Index.'
      - id: 'FAITH-016'
        name: 'PA Event Dispatcher & Intervention Logic'
        complexity: 'L'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-016-pa-event-dispatcher.md'
        dependencies: ['FAITH-015', 'FAITH-009']
        frs_reference: 'Section 3.2, 3.7.5, 3.7.6, 3.7.8'
        summary: 'Wire the PA''s main event loop: subscribe to system-events, dispatch to handlers. Implement event batching (Section 3.7.8): when waiting on multiple concurrent sub-tasks, accumulate gent:task_complete events and only invoke the LLM once all pending tasks have reported (or batch timeout expires). Urgent events (gent:error, channel:stalled, channel:loop_detected, pproval:requested) always bypass batching. Implement intervention logic for: channel:stalled (query agent for status), gent:task_blocked (determine blocker, resolve or escalate), gent:error (diagnose, restart container if needed, fallback model if configured), gent:model_escalation_requested (surface to user). On intervention: read only last N messages from channel (default 10), not full history.'
      - id: 'FAITH-017'
        name: 'Loop Detection'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-017-loop-detection.md'
        dependencies: ['FAITH-016']
        frs_reference: 'Section 3.2.2'
        summary: 'Implement rolling hash of key state changes (file SHA256, decisions) per channel. Detect direct repetition, circular dependency loops, and oscillation. Configurable window (default 10 messages) and threshold (default 2 repetitions). On detection: halt channel, publish `channel:loop_detected`, surface summary to user via Web UI. Configuration in `.faith/system.yaml` under `loop_detection`.'
      - id: 'FAITH-018'
        name: 'Living FRS Management'
        complexity: 'M'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-018-living-frs-management.md'
        dependencies: ['FAITH-015']
        frs_reference: 'Section 3.8'
        summary: 'Implement the PA''s FRS workflow: receive user natural language → classify as new requirement / refinement / correction / question → update `.faith/docs/frs.md` with numbered REQ/DEC entries → publish `file:changed` → determine affected agents/tasks → issue updated instructions. Maintain consistent FRS structure (Requirements, Decisions, Out of Scope, Open Questions).'
  - id: 5
    title: 'Security & Approval System'
    status: 'DONE'
    summary: ''
    task_count: 4
    tasks:
      - id: 'FAITH-019'
        name: 'Security YAML Schema & Regex Approval Engine'
        complexity: 'M'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-019-security-approval-engine.md'
        dependencies: ['FAITH-003']
        frs_reference: 'Section 5.1, 5.3'
        summary: 'Implement the ask-first approval engine: evaluate `always_ask`, `always_deny`, and `always_allow` rules from `.faith/security.yaml`, then fall back to prompting the user. Support session-scoped remembered approvals/denials and path-based filesystem memory. Per-agent trust levels (`high`, `standard`, `low`) may influence recommendations/UI but do not silently bypass approval for new MCP actions.'
      - id: 'FAITH-020'
        name: 'Approval Request/Response Flow'
        complexity: 'M'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-020-approval-request-response.md'
        dependencies: ['FAITH-019', 'FAITH-008']
        frs_reference: 'Section 5.6'
        summary: 'Implement the approval response options: Allow once, Approve for session, Always allow, Always ask, Deny once, Deny permanently. For persisted options, generate a rule from the approved/denied action, display it to the user for review, and write it to `.faith/security.yaml`. Filesystem approvals must support exact file, folder, or path-pattern style remembered scopes. Publish `approval:requested` and `approval:decision` events. Visual de-emphasis of permanent options in the Web UI data sent over WebSocket.'
      - id: 'FAITH-021'
        name: 'Audit Log System'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-021-audit-log-system.md'
        dependencies: ['FAITH-008']
        frs_reference: 'Section 5.5'
        summary: 'Implement the append-only audit log (`logs/audit.log`). JSON lines format. Log all tool operations (filesystem read/write, DB queries, Python execution, browser actions), all approval decisions, all container lifecycle events, file history restorations. Include: timestamp, agent, tool, action, target, approval tier, rule matched, decision, channel, msg_id, audit_id. PA is the sole writer. Log rotation configurable via `.faith/system.yaml` (default 90 days, archive not delete).'
  - id: 6
    title: 'MCP Tool Servers'
    status: 'TODO'
    summary: 'FAITH-owned MCP tools run as dedicated project-scoped containers. External v1 MCP servers are registry-backed npm `stdio` servers launched inside the project-scoped `mcp-runtime` container managed by the PA. Each FAITH-owned MCP server lives as a subpackage under `src/faith_mcp/`. Ownership note: - Mandatory FAITH-owned MCP tools in v1: `FAITH-022`, `FAITH-023`, `FAITH-024`, `FAITH-027`, `FAITH-032`, `FAITH-033` - `FAITH-034` is FAITH-owned, but it is a PA/runtime feature rather than an MCP server - `FAITH-025`, `FAITH-026`, `FAITH-028`, `FAITH-029`, `FAITH-030`, and `FAITH-031` should be treated as external-registry candidates or optional future work unless a public MCP server fails to meet FAITH requirements'
    task_count: 12
    tasks:
      - id: 'FAITH-022'
        name: 'Filesystem MCP Server'
        complexity: 'L'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-022-filesystem-mcp-server.md'
        dependencies: ['FAITH-003', 'FAITH-008', 'FAITH-057']
        frs_reference: 'Section 4.3'
        summary: 'Implement a FAITH-owned filesystem MCP server. This is a security-first project-workspace boundary, not a general-purpose filesystem product, and must enforce FAITH-specific path restrictions, deny-lists, file watching, and audit-aware file operations.'
      - id: 'FAITH-023'
        name: 'Filesystem File History'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'DONE'
        task_doc: 'tasks/FAITH-023-filesystem-file-history.md'
        dependencies: ['FAITH-022']
        frs_reference: 'Section 4.3.5'
        summary: 'Implement round-robin file versioning under `history/`. Mirror workspace path structure. Metadata sidecar (`.meta.json`) per version with timestamp, agent, channel, msg_id, audit_id, summary. Auto-skip for git-managed mounts. Configurable per mount (`history: true/false`, `history_depth: N`). MCP commands: `list_history(path)`, `restore_version(path, version)`. Restoration creates a new history entry.'
      - id: 'FAITH-024'
        name: 'Python Execution MCP Server'
        complexity: 'M'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'DONE'
        task_doc: 'tasks/FAITH-024-python-execution-mcp.md'
        dependencies: ['FAITH-003', 'FAITH-008', 'FAITH-057']
        frs_reference: 'Section 4.2'
        summary: 'Implement a FAITH-owned Python execution MCP server. This is a core trust-boundary tool and must enforce FAITH-specific sandboxing, approvals, package policy, audit logging, and filesystem restrictions. Execution is container-first by default, but the PA should route directly to the optional host-worker path when the task clearly requires host-only context or resources. Sandbox containers may run as root only inside the container and only under strict isolation controls: no Docker socket, no privileged mode, no host networking, and approved mounts only. The implementation must include explicit security hardening and security-focused testing, not just functional behavior.'
      - id: 'FAITH-025'
        name: 'PostgreSQL Database MCP Server'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'TODO'
        task_doc: 'tasks/FAITH-025-database-mcp-server.md'
        dependencies: ['FAITH-003', 'FAITH-008']
        frs_reference: 'Section 4.4'
        summary: 'Prefer an external/public database MCP server in v1. Only implement an in-house database MCP server if external options cannot satisfy FAITH''s permission validation, audit logging, declared-access enforcement, and per-action approval requirements for writes.'
      - id: 'FAITH-026'
        name: 'Browser Automation MCP Server (Playwright)'
        complexity: 'L'
        model: 'Sonnet / GPT-5.4'
        status: 'TODO'
        task_doc: 'tasks/FAITH-026-browser-automation-mcp.md'
        dependencies: ['FAITH-003', 'FAITH-008']
        frs_reference: 'Section 4.5'
        summary: 'Prefer an external/public Playwright MCP server in v1. Only implement an in-house browser automation server if the public server cannot satisfy FAITH''s credential, privacy, or reporting requirements.'
      - id: 'FAITH-027'
        name: 'Code Index MCP Server (tree-sitter)'
        complexity: 'L'
        model: 'Opus / GPT-5.4 high reasoning'
        status: 'TODO'
        task_doc: 'tasks/FAITH-027-code-index-mcp.md'
        dependencies: ['FAITH-022']
        frs_reference: 'Section 4.8'
        summary: 'AST-based code indexing using `tree-sitter`. Watch workspace mount for file changes. MCP commands: `list_files`, `list_symbols(file|module)`, `get_function(name, file)`, `search_symbol(name)`, `describe_symbol(name)`. Support Python, JavaScript, TypeScript, Java, Go at minimum. Index updated in real time via file event watching. Returns structured JSON (not raw text).'
      - id: 'FAITH-028'
        name: 'RAG / ChromaDB MCP Server'
        complexity: 'L'
        model: 'Sonnet / GPT-5.4'
        status: 'TODO'
        task_doc: 'tasks/FAITH-028-rag-chromadb-mcp.md'
        dependencies: ['FAITH-002', 'FAITH-022']
        frs_reference: 'Section 4.7'
        summary: 'Optional future work. RAG is not required by default in v1 and should be loaded later from the registry if needed, rather than treated as a mandatory FAITH-owned tool.'
      - id: 'FAITH-029'
        name: 'Git MCP Server'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'TODO'
        task_doc: 'tasks/FAITH-029-git-mcp-server.md'
        dependencies: ['FAITH-019']
        frs_reference: 'Section 4.12'
        summary: 'Prefer an external/public local git MCP server in v1 if it can satisfy FAITH''s approval and audit policy. Only implement an in-house git MCP server if required by FAITH''s security or audit model.'
      - id: 'FAITH-030'
        name: 'Pricing MCP Server'
        complexity: 'M'
        model: 'Sonnet / GPT-5.4'
        status: 'TODO'
        task_doc: 'tasks/FAITH-030-pricing-mcp-server.md'
        dependencies: ['FAITH-026', 'FAITH-008']
        frs_reference: 'Section 4.9'
        summary: 'Optional future work. Pricing awareness is useful, but a dedicated FAITH-owned Pricing MCP server is not required for the minimal open-source v1 architecture.'
      - id: 'FAITH-031'
        name: 'Web Search MCP Server'
        complexity: 'S'
