        summary: 'Implement skill loading from `.faith/skills/*.md` — markdown files with YAML frontmatter (name, description, timeout, executor, command, notify_on_complete, unattended_allowed, unattended_security, auto_approve). Support two executor modes: `executor: ai` (default) sends the markdown body to the PA as a prompt; `executor: script` runs the `command` field directly as a subprocess inside the PA container without AI involvement (markdown body is documentation only). Script skills get the same audit logging, return codes, scheduler integration, Web UI visibility, and `notify_on_complete` support as AI skills. Implement `--skill <name>` flag in CLI to load and execute a named skill. CLI parses frontmatter for operational settings. Implement `--unattended` flag with the three-tier security model: `unattended_allowed` master gate (false = exit code 4 immediately), `unattended_security` mode (`safe`/`all`/`explicit`), and `auto_approve` regex list for explicit mode. In `safe` mode: only actions already covered by `always_allow` rules pass automatically; unmatched ask-first actions and `always_ask` actions block. In `all` mode: everything passes without prompting. In `explicit` mode: only `auto_approve` list patterns pass. For script skills, `--unattended` is accepted but has no effect (no approvals needed). Log all unattended approvals with `approval_source: "unattended"`, skill name, and security mode in the audit trail. Implement Skills panel in Web UI listing `.faith/skills/*.md` with Run/Edit buttons.'
