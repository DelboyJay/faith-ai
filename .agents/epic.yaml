        summary: 'Implement the built-in cron-style scheduler running inside the PA container. On startup, load all `.faith/skills/*.md`, parse frontmatter for `schedule` (cron expression) and `schedule_enabled` fields, register due skills. Scheduler runs as an `asyncio` background task ticking every 60 seconds, using `croniter` to compute next-run times. When a skill is due: for `executor: ai` skills, create a task internally (same as `POST /api/task`) with `trigger: "scheduled"` in `session.meta.json` and respect the skill''s `unattended_allowed`/`unattended_security` settings. For `executor: script` skills, run the `command` directly as a subprocess (no PA task created). Skip trigger if skill is still running from previous invocation (log `skipped_still_running`). Write all schedule events to `logs/scheduler.log` (JSON lines). Re-parse skill files on hot-reload (FAITH-004) to update/add/remove registrations without restart. Implement Scheduled Skills panel in Web UI showing schedule, next run, last run, status, duration, and Run Now/Enable/Disable/View Log actions. Enable/Disable writes `schedule_enabled` to the skill''s frontmatter.'
