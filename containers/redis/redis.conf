# FAITH Redis Configuration

# Persistence
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save ""
dir /data

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Networking
bind 0.0.0.0
protected-mode no
tcp-keepalive 60

# Logging
loglevel notice
logfile ""
