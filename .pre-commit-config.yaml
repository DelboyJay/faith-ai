repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check --fix --no-cache
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format --no-cache
        language: system
        types_or: [python, pyi]
        require_serial: true
